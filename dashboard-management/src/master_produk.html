{{> partials/main }}

<head>

    {{> partials/title-meta title="ST Corp dahboard  - development by: clavisdev" }}

    {{> partials/head-css }}
    <script>
        document.addEventListener('alpine:initialized', () => {
            const app = Alpine.store('app');
            const applyMode = () => {
                if (app.mode === 'dark') {
                    document.documentElement.classList.add('dark');
                } else {
                    document.documentElement.classList.remove('dark');
                }
            };
            applyMode();

            Alpine.effect(() => {
                applyMode();
            });
        });
    </script>
    <style>
        /* Pastikan elemen peta punya tinggi, kalau tidak peta tidak akan terlihat */
        html,body { height: 100%; margin: 0; }
        #productTable {
            table-layout: fixed !important;
            width: 100% !important;
        }
        table.dataTable thead th {
            background: #2d4169 !important;
            color: white !important;
        }
        .dark .date-input {
            background-color: #0f172a !important;
            color: white !important;
        }
        .dark .date-input::-webkit-calendar-picker-indicator {
            filter: invert(1);
            cursor: pointer;
        }
        #productTable_length select {
            width: 70px;
            padding: 4px 8px;
        }
        #productTable_wrapper .dataTables_filter,
        #productTable_wrapper .dataTables_length {
            margin-bottom: 6px;
        }
        #productTable_wrapper input[type="search"]::-webkit-search-cancel-button,
        #productTable_wrapper input[type="search"]::-webkit-search-decoration {
            -webkit-appearance: none;
            appearance: none;
        }
        .sticky-col-left,
        .sticky-col-right {
            position: sticky;
            background: white;
            z-index: 30;
        }
        .sticky-col-left {
            left: 0;
        }
        .sticky-col-right {
            right: 0;
        }
        #productTable thead .sticky-col-left,
        #productTable thead .sticky-col-right {
            z-index: 40;
            background: #2d4169 !important;
            color: white !important;
        }
        #productTable_wrapper .dataTables_scrollHead thead th:first-child {
            position: sticky !important;
            left: 0 !important;
            z-index: 40 !important;
            background: #2d4169 !important;
            color: #fff !important;
        }
        #productTable_wrapper .dataTables_scrollHead thead th:last-child {
            position: sticky !important;
            right: 0 !important;
            z-index: 40 !important;
            background: #2d4169 !important;
            color: #fff !important;
        }
        .dark .sticky-col-left,
        .dark .sticky-col-right {
            background: #1e293b !important;
        }
        #productTable th:first-child,
        #productTable td:first-child {
            width: 30px !important;
            min-width: 40px !important;
            max-width: 40px !important;
        }
        #productTable th:nth-child(3),
        #productTable td:nth-child(3) {
            width: 300px !important;
            min-width: 100px !important;
            max-width: 2000px !important;
            white-space: normal !important;
            word-break: break-word !important;
            overflow-wrap: break-word !important;
            vertical-align: middle;
        }
    </style>
</head>

{{> partials/body }}
<script src="assets/js/pages/authMiddleware.js"></script>
<div class="bg-slate-50 dark:bg-dark">
    <div class="bg-[url('../images/bg-main.png')] bg-black group-data-[sidebar=dark]/item:bg-darklight group-data-[sidebar=brand]/item:bg-sky-950 min-h-[220px] sm:min-h-[250px] bg-bottom fixed hidden w-full -z-50 detached-img"></div>
    <div x-cloak class="fixed inset-0 z-10 bg-black/60 dark:bg-dark/90 lg:hidden" :class="{'hidden' : !$store.app.sidebar}" @click="$store.app.toggleSidebar()"></div>
    <div class="flex mx-auto main-container">
        {{> partials/sidebar }}
        <div class="flex-1 main-content">
            {{> partials/topbar }}
            <div class="relative space-y-4 detached-content !px-6 !py-4 w-full max-w-none">
                <div id="master-product"></div>
            </div>
        </div>
    </div>
</div>
